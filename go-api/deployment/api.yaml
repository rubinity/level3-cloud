apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: goapi-sa
      containers:
      - name: api-cont
        image: registry.onstackit.cloud/mariia-api/api_image:latest
        ports:
        - containerPort: 80
        env:
        - name: ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: api-secret
              key: ACCESS_SECRET
      imagePullSecrets:
        - name: stackit-registry
