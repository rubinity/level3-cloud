apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-web
  template:
    metadata:
      labels:
        app: simple-web
    spec:
      containers:
      - name: simple-web
        image: byjg/static-httpserver
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: simple-web
spec:
  type: LoadBalancer
  selector:
    app: simple-web
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
