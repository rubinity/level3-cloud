apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['127.0.0.1:9090']
        metrics_path: /prometheus/metrics
      - job_name: kube-state
        static_configs:
          - targets: ['kube-state-metrics.default.svc.cluster.local:8080']
      # - job_name: node-exporter
      #   static_configs:
      #     - targets: ['node-exporter.kube-system.svc:16909']
      - job_name: kubelet
        scheme: https
        metrics_path: /api/v1/nodes/${1}/proxy/metrics
        kubernetes_sd_configs:
          - role: node
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics
      - job_name: cadvisor
        scheme: https
        metrics_path: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        kubernetes_sd_configs:
          - role: node
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
      - job_name: "node-exporter"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - kube-system
        relabel_configs:
          # Keep only pods with component=node-exporter
          - source_labels: [__meta_kubernetes_pod_label_component]
            action: keep
            regex: node-exporter

          # Set instance to pod IP + container port
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:16909

          # Optional: add node name as label for Grafana grouping
          - source_labels: [__meta_kubernetes_node_name]
            target_label: kubernetes_node
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: goapi-sa
      containers:
      - name: prometheus-cont
        image: prom/prometheus:latest
        args:
          - "--web.external-url=https://rubinity.stackit.gg/prometheus"
          - "--web.route-prefix=/prometheus"
          - "--config.file=/etc/prometheus/prometheus.yml"
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: prometheus-config
          mountPath: /etc/prometheus
      volumes:
      - name: prometheus-config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
  - name: prometheus
    protocol: TCP
    port: 9090
    targetPort: 9090
  selector:
    app: prometheus